<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ Thảo Cầm Viên thông minh</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* 2. Định dạng bản đồ tràn toàn màn hình */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Chống cuộn trang thừa */
        }

        #map {
            height: 100vh;
            width: 100%;
            background-color: #f8f9fa; /* Màu nền chờ trong lúc tải bản đồ */
        }

        /* 3. Tùy chỉnh Popup cho đẹp (Font chữ chuyên nghiệp) */
        .leaflet-popup-content-wrapper {
            border-radius: 10px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 5px;
        }

        .leaflet-popup-content b {
            color: #d35400; /* Màu cam đậm cho tiêu đề khu vực */
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/map-logic.js"></script>

</body>
</html>
