<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Codes - Thảo Cầm Viên</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #1B5E20;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        .controls button {
            background: #2E7D32;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin: 0 5px;
        }
        .controls button:hover { background: #1B5E20; }
        .controls input {
            padding: 8px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            width: 300px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 2px solid #E8F5E9;
            page-break-inside: avoid;
        }
        .card .poi-id {
            display: inline-block;
            background: #E8F5E9;
            color: #2E7D32;
            font-weight: bold;
            font-size: 13px;
            padding: 3px 12px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .card .qr-container {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }
        .card .name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-top: 8px;
            line-height: 1.3;
        }
        .card .code-text {
            font-size: 18px;
            font-weight: bold;
            color: #2E7D32;
            margin-top: 6px;
            letter-spacing: 2px;
        }
        .card .hint {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        @media print {
            body { background: white; padding: 10px; }
            .controls { display: none; }
            .grid { gap: 15px; grid-template-columns: repeat(3, 1fr); }
            .card { box-shadow: none; border: 1px solid #ccc; padding: 15px; }
        }
    </style>
</head>
<body>
    <h1>Thảo Cầm Viên - Mã QR</h1>
    <p class="subtitle">In và dán mã QR tại mỗi chuồng/khu vực. Khách quét bằng app để nghe thuyết minh.</p>

    <div class="controls">
        <input type="number" id="poiCount" placeholder="Số lượng POI (mặc định: 20)" min="1" max="100" value="20">
        <button onclick="generateQrCodes()">Tạo mã QR</button>
        <button onclick="window.print()">In tất cả</button>
    </div>

    <div class="grid" id="qrGrid"></div>

    <script>
        function generateQrCodes() {
            const count = parseInt(document.getElementById('poiCount').value) || 20;
            const grid = document.getElementById('qrGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= count; i++) {
                const qrData = `TCV-${i}`;
                const paddedId = String(i).padStart(3, '0');

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="poi-id">POI #${i}</div>
                    <div class="qr-container" id="qr-${i}"></div>
                    <div class="code-text">${qrData}</div>
                    <div class="hint">Hoặc nhập số: ${paddedId}</div>
                `;
                grid.appendChild(card);

                // Generate QR code
                new QRCode(document.getElementById(`qr-${i}`), {
                    text: qrData,
                    width: 150,
                    height: 150,
                    colorDark: '#1B5E20',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
        }

        // Auto-generate on load
        generateQrCodes();
    </script>
</body>
</html>
